name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  # Job 1: Erst testen und bauen (Qualitätssicherung)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v6

      - name: .NET Umgebung einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Abhängigkeiten wiederherstellen
        run: dotnet restore DevopsFallstudie/DevopsFallstudie/DevopsFallstudie.csproj

      - name: Code kompilieren
        run: dotnet build DevopsFallstudie/DevopsFallstudie/DevopsFallstudie.csproj --no-restore

      - name: Automatisierte Tests ausführen
        run: dotnet test DevopsFallstudie/DevopsFallstudie/DevopsFallstudie.csproj --no-build --verbosity normal

      - name: Code-Qualität prüfen (Static Code Analysis)
        run: dotnet format DevopsFallstudie/DevopsFallstudie/DevopsFallstudie.csproj --verify-no-changes --severity warn

  # Job 2: Docker Image erstellen und hochladen
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Login bei GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # WICHTIG: Hier alles kleingeschrieben, sonst gibt es den "Denied" Fehler!
          tags: ghcr.io/niklasheckmann/devopsfallstudie:latest

  # Job 3: Auf Hetzner ausrollen
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging  # Keine Approval-Regel! Läuft sofort durch.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Kopiere docker-compose.yml auf Staging-Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.STAGING_SERVER_IP }} # <--- WICHTIG: Die IP vom neuen Server!
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}    # <--- WICHTIG: Der Key vom neuen Server!
          source: "docker-compose.yml"
          target: "/root/devopsfallstudie"

      - name: Deploy auf Staging via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /root/devopsfallstudie
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --force-recreate

  # ==========================================
  # 2. DEPLOY AUF LIVE-SERVER (PRODUCTION)
  # ==========================================
  deploy-production:
    needs: deploy-staging # <--- WICHTIG: Startet erst, wenn Staging durch ist!
    runs-on: ubuntu-latest
    environment: production # <--- WICHTIG: Hier springt dein Approval-Türsteher an!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Kopiere docker-compose.yml auf Production-Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }} # <--- WICHTIG: Die IP vom alten, echten Server!
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}    # <--- WICHTIG: Der Key vom alten Server!
          source: "docker-compose.yml"
          target: "/root/devopsfallstudie"

      - name: Deploy auf Production via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /root/devopsfallstudie
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --force-recreate
