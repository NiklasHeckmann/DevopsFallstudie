name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

jobs:
  # Job 1: Erst testen und bauen (Qualitätssicherung)
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: .NET Umgebung einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Abhängigkeiten wiederherstellen
        run: dotnet restore DevopsFallstudie/DevopsFallstudie/DevopsFallstudie.csproj

      - name: Code kompilieren
        run: dotnet build DevopsFallstudie/DevopsFallstudie/DevopsFallstudie.csproj --no-restore

  # Job 2: Docker Image erstellen und hochladen
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login bei GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # WICHTIG: Hier alles kleingeschrieben, sonst gibt es den "Denied" Fehler!
          tags: ghcr.io/niklasheckmann/devopsfallstudie:latest

  # Job 3: Auf Hetzner ausrollen
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # NEU: Wir kopieren die Datei sicher auf den Server
      - name: Kopiere docker-compose.yml auf den Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/root/devopsfallstudie"

      # ANGEPASST: Nur noch ausführen, nicht mehr generieren
      - name: Deploy auf Hetzner via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/devopsfallstudie
            
            # Bei GitHub Registry einloggen
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u niklasheckmann --password-stdin
            
            # Compose die Arbeit machen lassen
            docker compose pull
            docker compose up -d