name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

# WICHTIG: Damit GitHub in seine eigene Registry schreiben darf
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login bei GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Hier "weiß" GitHub wohin: ghcr.io/DEIN_NAME/DEIN_REPO:latest
          tags: ghcr.io/${{ github.repository }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy auf Hetzner via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Beim Server in die Registry einloggen
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. Das neue Image ziehen
            docker pull ghcr.io/${{ github.repository }}:latest
            
            # 3. Alten Container stoppen und neuen starten
            docker stop crm-app || true
            docker rm crm-app || true
            docker run -d --name crm-app -p 80:8080 --restart always ghcr.io/${{ github.repository }}:latest